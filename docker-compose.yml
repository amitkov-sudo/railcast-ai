version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-railcast}
      DB_USER: ${DB_USER:-railcast}
      DB_PASSWORD: ${DB_PASSWORD:-railcast}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      - postgres

  ml-inference:
    build:
      context: .
      dockerfile: infra/docker/inference.Dockerfile
    env_file:
      - .env
    ports:
      - "${INFERENCE_PORT:-8001}:8001"
    volumes:
      - ./:/app
    command: uvicorn main:app --app-dir services/ml-inference --host 0.0.0.0 --port 8001 --reload

  postgres:
    image: postgres:15
    container_name: railcast-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-railcast}
      POSTGRES_USER: ${DB_USER:-railcast}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-railcast}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
